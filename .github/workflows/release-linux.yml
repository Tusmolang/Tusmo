name: release

permissions:
  contents: write

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triplet: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev xz-utils curl
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Download zig (Linux)
        run: |
          mkdir -p zig
          curl --retry 5 --retry-delay 5 --retry-connrefused -L https://ziglang.org/download/0.11.0/zig-linux-x86_64-0.11.0.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz --strip-components=1 -C zig
          echo "ZIG=$(pwd)/zig/zig" >> $GITHUB_ENV

      - name: Freeze tusmo CLI
        run: pyinstaller --onefile tusmo.py

      - name: Collect bundle (Linux)
        shell: bash
        run: |
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          cp /usr/lib/x86_64-linux-gnu/libgc.a bundle/lib/
          cp -r /usr/include/gc bundle/include/
          cp dist/tusmo bundle/bin/
          cp "$ZIG" bundle/toolchain/zig
          printf '%s\n' '#!/usr/bin/env bash' 'exec "$(dirname "$0")/toolchain/zig" cc "$@"' > bundle/toolchain/cc
          chmod +x bundle/toolchain/cc

      - name: Package
        shell: bash
        run: tar -czf tusmo-${{ matrix.triplet }}.tar.gz -C bundle .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: tusmo-${{ matrix.triplet }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
