name: release-win

permissions:
  contents: write

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (MSYS2 + libgc from pacman community)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            tar

      - name: Install libgc (pacman community)
        shell: bash
        run: |
          pacman -Sy --noconfirm mingw-w64-x86_64-libgc || pacman -S --noconfirm mingw-w64-x86_64-libgc || true
          # fallback: use msys2 repo package name if different
          pacman -S --noconfirm libgc || true

      - name: Install zig
        shell: powershell
        run: choco install -y zig

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller ply requests pygls lsprotocol

      - name: Build tusmo CLI (onedir)
        shell: pwsh
        run: |
          pyinstaller --onedir tusmo.py `
            --hidden-import compiler `
            --hidden-import compiler.frontend `
            --hidden-import compiler.midend `
            --hidden-import compiler.backend `
            --hidden-import ply.lex `
            --hidden-import ply.yacc `
              --hidden-import requests `
            --add-data "compiler;compiler" `
            --add-data "runtime;runtime" `
            --add-data "stdlib;stdlib"

      - name: Build VS Code extension (VSIX)
        shell: pwsh
        run: |
          cd Extension
          npm ci
          npm install -g @vscode/vsce
          vsce package --out ../tusmo-vscode.vsix

      - name: Build hover server (onefile)
        shell: pwsh
        run: |
          pyinstaller --onefile LSP.py `
            -n tusmo-hover `
            --hidden-import compiler `
            --hidden-import compiler.frontend `
            --hidden-import compiler.midend `
            --hidden-import compiler.backend `
            --hidden-import ply.lex `
            --hidden-import ply.yacc `
            --hidden-import pygls `
            --hidden-import lsprotocol `
            --hidden-import lsprotocol.types `
            --add-data \"compiler;compiler\"

      - name: Collect bundle
        shell: bash
        run: |
          zig_path=$(which zig)
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          cp -r dist/tusmo/* bundle/bin/
          cp dist/tusmo-hover.exe bundle/bin/
          # try both mingw and msys paths for libgc
          if [ -f /mingw64/lib/libgc.a ]; then cp /mingw64/lib/libgc.a bundle/lib/; fi
          if [ -f /mingw64/include/gc/gc.h ]; then cp -r /mingw64/include/gc bundle/include/; fi
          if [ -f /usr/lib/libgc.a ]; then cp /usr/lib/libgc.a bundle/lib/; fi
          if [ -d /usr/include/gc ]; then cp -r /usr/include/gc bundle/include/; fi
          cp "$zig_path" bundle/toolchain/zig.exe
          cat > bundle/toolchain/cc.bat <<'EOS'
          @echo off
          "%~dp0\zig.exe" cc %*
          EOS

      - name: Package
        shell: bash
        run: tar -czf tusmo-windows-x86_64.tar.gz -C bundle .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tusmo-windows-x86_64.tar.gz
            tusmo-vscode.vsix
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
