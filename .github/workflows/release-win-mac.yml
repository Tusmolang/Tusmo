name: release-win-mac

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.4)"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            triplet: macos-x86_64
          - os: macos-14
            triplet: macos-arm64
          - os: windows-2022
            triplet: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # macOS deps
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install zig boehmgc
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      # Windows deps
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-libgc

      - name: Install zig (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install -y zig

      - name: Install PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Freeze tusmo CLI
        run: pyinstaller --onefile tusmo.py

      - name: Collect bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          GC_ROOT=$(brew --prefix boehmgc)
          cp "$GC_ROOT/lib/libgc.a" bundle/lib/
          cp -r "$GC_ROOT/include/gc" bundle/include/
          cp dist/tusmo bundle/bin/
          cp "$(which zig)" bundle/toolchain/zig
          cat > bundle/toolchain/cc <<'EOS'
          #!/usr/bin/env bash
          exec "$(dirname "$0")/zig" cc "$@"
          EOS
          chmod +x bundle/toolchain/cc

      - name: Collect bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          cp dist/tusmo.exe bundle/bin/
          cp /c/msys64/mingw64/lib/libgc.a bundle/lib/ || true
          cp -r /c/msys64/mingw64/include/gc bundle/include/ || true
          cp /c/ProgramData/chocolatey/lib/zig/tools/zig.exe bundle/toolchain/zig.exe
          cat > bundle/toolchain/cc.bat <<'EOS'
          @echo off
          "%~dp0\zig.exe" cc %*
          EOS

      - name: Package
        shell: bash
        run: tar -czf tusmo-${{ matrix.triplet }}.tar.gz -C bundle .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: tusmo-${{ matrix.triplet }}.tar.gz
          tag_name: ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
