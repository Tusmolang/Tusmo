name: release-mac

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.5)"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            triplet: macos-x86_64
          - os: macos-14
            triplet: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          brew update
          brew install zig boehmgc
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build tusmo CLI
        run: pyinstaller --onefile tusmo.py

      - name: Collect bundle
        shell: bash
        run: |
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          GC_ROOT=$(brew --prefix boehmgc)
          cp "$GC_ROOT/lib/libgc.a" bundle/lib/
          cp -r "$GC_ROOT/include/gc" bundle/include/
          cp dist/tusmo bundle/bin/
          cp "$(which zig)" bundle/toolchain/zig
          cat > bundle/toolchain/cc <<'EOS'
          #!/usr/bin/env bash
          exec "$(dirname "$0")/zig" cc "$@"
          EOS
          chmod +x bundle/toolchain/cc

      - name: Package
        shell: bash
        run: tar -czf tusmo-${{ matrix.triplet }}.tar.gz -C bundle .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: tusmo-${{ matrix.triplet }}.tar.gz
          tag_name: ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
